version: "3.9"

services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: phera
      POSTGRES_PASSWORD: phera
      POSTGRES_DB: phera
    ports:
      - "5432:5432"
    volumes:
      - phera_db:/var/lib/postgresql/data

volumes:
  phera_db:
